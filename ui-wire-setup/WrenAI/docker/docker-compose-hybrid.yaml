version: "3"

volumes:
  qdrant-data:

networks:
  wren-hybrid:
    driver: bridge

services:
  qdrant:
    image: qdrant/qdrant:v1.15.0
    restart: on-failure
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - wren-hybrid

  wren-ai-service:
    image: ghcr.io/canner/wren-ai-service:0.29.0
    restart: on-failure
    ports:
      - "5555:5555"
    environment:
      PYTHONUNBUFFERED: 1
      CONFIG_PATH: /app/config.yaml
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      QDRANT_HOST: qdrant
      WREN_AI_SERVICE_PORT: 5555
    volumes:
      - ../config.yaml:/app/config.yaml:ro
      - ../data:/app/data
    networks:
      - wren-hybrid
    depends_on:
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"

  trino:
    image: trinodb/trino:467
    restart: on-failure
    ports:
      - "8082:8080"
    networks:
      - wren-hybrid
